name: crypto_mecca_wallet
description: "Enterprise Crypto Wallet - Secure. Compliant. Professional."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.0
  glassmorphism_ui: ^0.3.1
  gradient_borders: ^1.0.0

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  get_it: ^8.0.2
  riverpod: ^2.5.1

  # Security & Encryption
  flutter_secure_storage: ^9.2.2
  encrypt: ^5.0.3
  cryptography: ^2.7.0
  pointycastle: ^3.9.1
  crypto: ^3.0.5
  bip39: ^1.0.6
  bip32: ^2.0.0
  ethereum_addresses: ^0.1.2
  bitcoindart: ^2.1.0
  walletdart: ^0.2.0
  web3dart: ^2.20.2
  solana_dart: ^0.2.0
  intl: ^0.19.0

  # Network & API
  dio: ^5.7.0
  http: ^1.2.2
  connectivity_plus: ^6.0.5

  # Local Storage
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # 2FA & Auth
  otp: ^3.1.4
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  local_auth: ^2.3.0

  # Utilities
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  version: ^3.0.2
  permission_handler: ^11.3.1

  # Firebase (for remote config, crashlytics - optional)
  firebase_core: ^3.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0
  freezed: ^2.5.7
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutter_native_splash: ^2.4.2

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
        - asset: assets/fonts/SpaceMono-Bold.ttf
          weight: 700


