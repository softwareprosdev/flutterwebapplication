# =============================================================================
# Crypto Mecca Wallet - Nginx Config with SPA Fallback
# Handles Flutter deep links correctly
# Optimized for Coolify (ports 3000 & 8080)
# =============================================================================

server {
    # Listen on both ports for compatibility
    listen 3000;
    listen 8080;
    listen [::]:3000;
    listen [::]:8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ==========================================================================
    # Static Asset Caching (Critical for Performance)
    # ==========================================================================
    
    # Flutter WASM files - cache forever
    location ~* \.wasm$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff";
        try_files $uri =404;
    }

    # JavaScript files - long cache
    location ~* \.js$ {
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-Content-Type-Options "application/javascript; charset=utf-8";
        try_files $uri =404;
    }

    # Asset manifest - cache with revalidation
    location ~* (AssetManifest|manifest\.json)$ {
        add_header Cache-Control "public, max-age=86400, must-revalidate";
        add_header X-Content-Type-Options "application/json; charset=utf-8";
        try_files $uri =404;
    }

    # Fonts - cache forever
    location ~* \.(woff|woff2|ttf|otf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff";
        try_files $uri =404;
    }

    # Images - long cache
    location ~* \.(png|jpg|jpeg|gif|svg|ico)$ {
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-Content-Type-Options "nosniff";
        try_files $uri =404;
    }

    # HTML files - short cache for navigation
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=0, no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "text/html; charset=utf-8";
        try_files $uri =404;
    }

    # ==========================================================================
    # SPA Routing Fallback (CRITICAL for Flutter web deep links)
    # ==========================================================================
    
    location / {
        try_files /index.html =404;
        
        # Add CSP header for Flutter
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://*.coingecko.com https://*.alchemy.com https://*.infura.io wss://; frame-ancestors 'none';" always;
        add_header X-Frame-Options "DENY" always;
    }

    # Explicit health check endpoint
    location /health {
        access_log off;
        return 200 '{"status":"ok","timestamp":"$time_iso8601"}';
        add_header Content-Type application/json;
    }

    location = /index.html { add_header Cache-Control "no-cache"; }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        add_header Content-Type text/html;
        return 500 '{"error":"Internal Server Error","code":500}';
    }
}