server {
    listen 80;
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Disable Cloudflare analytics injection
    add_header CF-Ray "" always;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, s-maxage=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Flutter SPA routing - serves index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable logs for static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|wasm)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    # Health check
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
}